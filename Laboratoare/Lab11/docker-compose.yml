services:
  mysql:
    image: mysql:8.4
    container_name: lab11_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lab11
      MYSQL_USER: lab11
      MYSQL_PASSWORD: lab11
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lab11_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: lab11_app
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
      MYSQL_URL: jdbc:mysql://mysql:3306/lab11?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USER: lab11
      MYSQL_PASSWORD: lab11
    ports:
      - "8080:8080"
