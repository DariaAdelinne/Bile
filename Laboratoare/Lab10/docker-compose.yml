services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: lab10_kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-init:
    image: apache/kafka:3.9.2
    container_name: lab10_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command: ["bash", "/init/create_topics.sh"]
    volumes:
      - ./init:/init:ro

  message_processor:
    build: .
    container_name: lab10_message_processor
    command: ["python", "message_processor.py"]
    environment: &appenv
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SESSION_ID: lab10-session
      AUCTION_TYPE: ${AUCTION_TYPE:-english}
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  bidding_processor:
    build: .
    container_name: lab10_bidding_processor
    command: ["python", "bidding_processor.py"]
    environment: *appenv
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  monitor:
    build: .
    container_name: lab10_monitor
    command: ["python", "monitor.py"]
    environment: *appenv
    ports:
      - "2500:2500"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  auctioneer:
    build: .
    command: ["python", "auctioneer.py"]
    environment: *appenv
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  bidder:
    build: .
    command: ["python", "bidder.py"]
    environment: *appenv
    depends_on:
      kafka-init:
        condition: service_completed_successfully
